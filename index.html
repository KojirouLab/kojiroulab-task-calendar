<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>タスクカレンダー</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c1622d">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="タスクカレンダー">
<style>
  :root{
    --bg:#f5f3ee; --panel:#ffffff; --ink:#2b2a28; --sub:#8b8478; --line:#e4e0d6;
    --accent:#c1622d; --accent-soft:#f0dfd2; --sun:#c0392b; --sat:#2d6ca8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink); height:100%; overflow:hidden;
    font-family:-apple-system,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}

  #app{display:flex; flex-direction:column; height:100dvh; overflow:hidden;}

  header{padding:12px 16px 8px; background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0;}
  header h1{font-size:16px; margin:0 0 2px; font-weight:700;}
  header .sub{font-size:10.5px; color:var(--sub); margin:0;}

  .toolbar{
    display:flex; align-items:center; gap:8px; padding:10px 12px;
    background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .nav-btn{font-size:16px; padding:4px 10px; border-radius:8px; color:var(--sub); background:var(--bg);}
  .month-label{font-size:14.5px; font-weight:700; min-width:98px; text-align:center;}
  .btn-today{font-size:11px; padding:6px 9px; border-radius:8px; border:1px solid var(--line); color:var(--sub);}
  .btn-add{
    margin-left:auto; background:var(--accent); color:#fff; font-size:12.5px; font-weight:600;
    padding:8px 12px; border-radius:8px; white-space:nowrap;
  }

  .fab{
    position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom));
    width:52px; height:52px; border-radius:50%; background:var(--accent); color:#fff;
    font-size:26px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.25); z-index:15;
  }
  .save-error{
    position:fixed; left:12px; right:12px; bottom:calc(16px + env(safe-area-inset-bottom));
    background:#c0392b; color:#fff; font-size:12.5px; font-weight:600; text-align:center;
    padding:10px 14px; border-radius:10px; z-index:40; box-shadow:0 4px 14px rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
  }
  .save-error button{
    background:#fff; color:#c0392b; font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:7px;
  }

  .due-banner{
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    background:#fdeceb; color:#8a2a1f; font-size:12.5px; font-weight:600;
    border-bottom:1px solid #f3c9c4; flex-shrink:0;
  }
  .due-banner span{flex:1;}
  .due-banner button{font-size:16px; color:#8a2a1f; line-height:1; padding:0 2px;}

  .view-tabs{display:flex; gap:6px; padding:8px 12px; background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0;}
  .view-tab{flex:1; font-size:12.5px; font-weight:700; padding:7px 0; border-radius:8px; color:var(--sub); background:var(--bg);}
  .view-tab.sel{background:var(--accent); color:#fff;}

  #dayView{padding:12px;}
  .dayview-empty{padding:40px 16px; text-align:center; color:var(--sub); font-size:13px;}

  #weekView{padding:12px;}
  .week-memo-block{margin-bottom:14px; padding:10px 12px; background:#faf8f3; border:1px solid var(--line); border-radius:10px;}
  .week-memo-block label{display:block; font-size:11px; color:var(--sub); font-weight:700; margin-bottom:5px;}
  .week-memo-block textarea{width:100%; min-height:52px; border:1px solid var(--line); border-radius:8px; background:#fff;
    font-size:12.5px; font-family:inherit; color:var(--ink); padding:7px 8px; resize:vertical;}
  .week-day-sec{margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--line);}
  .week-day-sec:last-child{border-bottom:none;}
  .week-day-head{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .week-day-dow{font-size:10.5px; font-weight:700; color:var(--sub);}
  .week-day-dow.wd-sun{color:var(--sun);}
  .week-day-dow.wd-sat{color:var(--sat);}
  .week-day-num{font-size:14px; font-weight:700; color:var(--ink); width:24px; height:24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;}
  .week-day-sec.is-today .week-day-num{background:var(--accent); color:#fff;}
  .week-day-add{margin-left:auto; font-size:15px; color:var(--sub); width:26px; height:26px; border-radius:7px; background:var(--bg);}
  .week-day-items .dayview-empty{padding:2px 0 2px 32px; text-align:left; font-size:11.5px; color:var(--sub);}
  .week-day-items .day-task-item{margin-left:0;}

  .weekday-row{display:grid; grid-template-columns:repeat(7,1fr) 92px; flex-shrink:0; background:var(--panel); border-bottom:1px solid var(--line);}
  .weekday-row div{padding:6px 0; text-align:center; font-size:10.5px; color:var(--sub); font-weight:700;}
  .weekday-row div.wd-sun{color:var(--sun);}
  .weekday-row div.wd-sat{color:var(--sat);}
  .weekday-row .wd-memo-head{font-size:9.5px; color:var(--sub);}

  .grid-wrap{flex:1; min-height:0; overflow-y:auto; background:var(--bg);}
  .month-grid{display:flex; flex-direction:column;}
  .week-row{display:grid; grid-template-columns:repeat(7,1fr) 92px; border-bottom:1px solid var(--line);}
  .day-cell{
    border-right:1px solid var(--line); padding:4px 3px 6px; min-height:78px;
    display:flex; flex-direction:column; gap:2px;
  }
  .week-view .day-cell{min-height:180px;}
  .week-memo{border-left:1px solid var(--line); background:#faf8f3; padding:4px;}
  .week-memo-input{
    width:100%; height:100%; min-height:78px; border:none; background:transparent; resize:none;
    font-size:10px; line-height:1.4; font-family:inherit; color:var(--ink); padding:3px;
  }
  .week-memo-input::placeholder{color:#b8b2a4;}
  .week-memo-input:focus{outline:1px solid var(--accent); background:#fff; border-radius:5px;}
  .day-cell.out{background:#efece4;}
  .day-cell .dnum{
    font-size:11px; font-weight:700; width:20px; height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; color:var(--ink);
  }
  .day-cell.out .dnum{color:#b8b2a4;}
  .day-cell.wd-sun .dnum{color:var(--sun);}
  .day-cell.wd-sat .dnum{color:var(--sat);}
  .day-cell.is-today .dnum{background:var(--accent); color:#fff;}

  .bar, .bar-spacer{height:16px; border-radius:4px; font-size:9.5px; display:flex; align-items:center;
    padding:0 4px; overflow:hidden; white-space:nowrap; color:#fff; font-weight:600;}
  .bar{touch-action:none; user-select:none; cursor:grab;}
  .bar.dragging{opacity:.45;}
  .bar-spacer{visibility:hidden;}
  .day-cell.drop-target{outline:2px dashed var(--accent); outline-offset:-2px; background:var(--accent-soft);}
  .bar.is-start{border-radius:8px 4px 4px 8px; margin-left:1px;}
  .bar.is-end{border-radius:4px 8px 8px 4px; margin-right:1px;}
  .bar.is-start.is-end{border-radius:8px; margin:0 1px;}
  .bar.cont-left{padding-left:2px;}
  .bar.done{opacity:.45; text-decoration:line-through;}
  .bar.overdue{box-shadow:inset 0 0 0 2px #c0392b;}
  .bar.schedule{background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.35) 0 4px, transparent 4px 9px); border-radius:9px;}
  .bar-more{font-size:9px; color:var(--sub); padding-left:4px;}

  /* sheets */
  .overlay{position:fixed; inset:0; background:rgba(30,28,24,.42); display:flex; align-items:flex-end; justify-content:center; z-index:30;}
  .sheet{background:#fff; width:100%; max-width:480px; border-radius:16px 16px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    max-height:86vh; overflow-y:auto; position:relative; animation:up .16s ease-out;}
  @keyframes up{from{transform:translateY(14px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet h2{font-size:15px; margin:0 0 4px;}
  .sheet .sheet-sub{font-size:11.5px; color:var(--sub); margin:0 0 14px;}
  .close-x{position:absolute; top:10px; right:14px; font-size:20px; color:var(--sub);}

  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11.5px; color:var(--sub); margin-bottom:5px; font-weight:600;}
  .field input[type=text], .field input[type=date], .field select, .field textarea{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-size:14px;
    font-family:inherit; background:#fafaf8; color:var(--ink);
  }
  .field textarea{resize:vertical; min-height:52px;}
  .row2{display:flex; gap:8px;}
  .row2 > div{flex:1;}
  .colorset{display:flex; gap:8px; flex-wrap:wrap;}
  .swatch{width:26px; height:26px; border-radius:50%; border:2px solid transparent;}
  .swatch.sel{border-color:var(--ink);}
  .recur-options{display:flex; flex-direction:column; gap:6px;}
  .recur-opt{display:flex; align-items:center; gap:8px; padding:9px 10px; border:1px solid var(--line); border-radius:9px; font-size:13px;}
  .recur-opt.sel{border-color:var(--accent); background:var(--accent-soft);}
  .preview-line{font-size:11.5px; color:var(--accent); margin-top:6px; font-weight:600;}

  .sheet-actions{display:flex; gap:8px; margin-top:16px;}
  .sheet-actions button{flex:1; padding:11px; border-radius:9px; font-size:13.5px; font-weight:600;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-cancel{background:#f1efe9; color:var(--ink);}
  .btn-danger{background:#fdeceb; color:#c0392b;}
  .btn-outline{background:#fff; border:1px solid var(--line); color:var(--ink);}

  .reorder-item{display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:10px;
    padding:9px 10px; margin-bottom:8px;}
  .reorder-name{font-size:13px; font-weight:700; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .reorder-meta{font-size:10px; color:var(--sub); white-space:nowrap;}
  .reorder-btns{display:flex; gap:4px;}
  .reorder-btns button{font-size:13px; width:28px; height:28px; border-radius:7px; border:1px solid var(--line); background:#fff; color:var(--ink);}
  .reorder-btns button:disabled{opacity:.3;}

  .day-task-item{border:1px solid var(--line); border-radius:10px; padding:10px 11px; margin-bottom:8px;}
  .day-task-item.schedule{background:#fafaf9; border-style:dashed;}
  .dti-top{display:flex; align-items:center; gap:8px;}
  .dti-dot{width:10px; height:10px; border-radius:50%; flex-shrink:0;}
  .dti-name{font-size:13.5px; font-weight:700; flex:1;}
  .dti-name.done{text-decoration:line-through; color:var(--sub);}
  .dti-time{font-size:10.5px; font-weight:700; color:var(--accent); background:var(--accent-soft);
    border-radius:5px; padding:2px 5px; flex-shrink:0;}
  .dti-tag{font-size:10px; font-weight:700; color:#6a6bbd; background:#ecebfa; border-radius:5px; padding:2px 6px; flex-shrink:0;}
  .dti-imp{font-size:10px; font-weight:700; border-radius:5px; padding:2px 6px; flex-shrink:0;}
  .dti-imp.imp-highest{color:#fff; background:#c0392b;}
  .dti-imp.imp-high{color:#c1622d; background:#f6e2d2;}
  .dti-imp.imp-low{color:var(--sub); background:var(--bg);}
  .dti-meta{font-size:10.5px; color:var(--sub); margin:2px 0 8px 18px;}
  .dti-memo{font-size:11.5px; color:var(--ink); background:#fafaf8; border:1px solid var(--line); border-radius:8px;
    padding:7px 9px; margin:0 0 8px 18px; white-space:pre-wrap; word-break:break-word; line-height:1.5;}
  .dti-actions{display:flex; gap:6px; margin-left:18px; flex-wrap:wrap;}
  .dti-actions button{font-size:11px; padding:6px 9px; border-radius:7px; border:1px solid var(--line); color:var(--ink); background:#fff;}
  .dti-actions button.on{background:#eef4ea; color:#4a7a3d; border-color:#cfe4c4;}

  .todo-row{display:flex; align-items:center; gap:8px; padding:10px 4px; border-bottom:1px solid var(--line);}
  .todo-row:last-child{border-bottom:none;}
  .todo-row.checked-off{opacity:.35;}
  .todo-check-wrap{display:flex; align-items:center; flex-shrink:0; cursor:pointer;}
  .todo-checkbox{width:19px; height:19px; flex-shrink:0; accent-color: var(--accent); cursor:pointer;}
  .todo-name{font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; flex:1; min-width:0;}
  .todo-due{font-size:11px; color:var(--sub); flex-shrink:0; margin-left:6px; cursor:pointer;}
  .todo-due.overdue{color:#c0392b; font-weight:700;}
  .todo-icon-btn{border:none; background:none; font-size:14px; padding:4px 6px; color:var(--sub); flex-shrink:0;}

  .loglist{list-style:none; margin:8px 0 4px 18px; padding:0; display:flex; flex-direction:column; gap:6px;}
  .logitem{display:flex; justify-content:space-between; gap:8px; background:#fafaf8; border:1px solid var(--line); border-radius:8px; padding:7px 9px;}
  .logitem .txt{font-size:12.5px; line-height:1.5; white-space:pre-wrap; word-break:break-word;}
  .logitem .del{color:var(--sub); font-size:15px; line-height:1;}
  .noentries{font-size:11.5px; color:var(--sub); margin:6px 0 6px 18px;}

  .empty{padding:60px 24px; text-align:center; color:var(--sub);}
  .empty .big{font-size:32px; margin-bottom:8px;}
  .empty p{font-size:13px; line-height:1.7; margin:4px 0;}
</style>
<style>
  .auth-gate{position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; z-index:50; padding:24px;}
  .auth-card{width:100%; max-width:340px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:22px;}
  .auth-card h2{font-size:16px; margin:0 0 6px;}
  .auth-card p{font-size:12.5px; color:var(--sub); margin:0 0 14px; line-height:1.6;}
  .auth-card input{width:100%; border:1px solid var(--line); border-radius:8px; padding:10px 11px; font-size:14px; font-family:inherit; background:#fafaf8; color:var(--ink); margin-bottom:10px;}
  .auth-card button{width:100%; background:var(--accent); color:#fff; font-size:13.5px; font-weight:600; padding:11px; border-radius:9px;}
  .auth-msg{font-size:12px; color:var(--sub); margin-top:10px; line-height:1.6;}
</style>
</head>
<body>
<div id="authGate" class="auth-gate">
  <div class="auth-card">
    <h2>ログイン</h2>
    <p id="authMsg">続けるにはメールアドレスを入力してください。届いたメールの確認コードでログインできます。</p>
    <input type="email" id="authEmailInput" placeholder="you@example.com" autocomplete="email">
    <button id="authSubmitBtn">確認コードを送る</button>
    <div id="authCodeRow" style="display:none; margin-top:12px;">
      <input type="text" id="authCodeInput" placeholder="123456" inputmode="numeric" autocomplete="one-time-code">
      <button id="authVerifyBtn">コードを確認</button>
    </div>
  </div>
</div>
<div id="app" style="display:none;">
  <div id="dueBanner" class="due-banner" style="display:none;">
    <span id="dueBannerMsg"></span>
    <button id="dueBannerClose">×</button>
  </div>
  <header>
    <h1>タスクカレンダー</h1>
    <p class="sub">登録日から完了まで日付を跨いでブロックが伸びます。日付をタップして詳細・記録を確認できます。</p>
  </header>
  <div class="toolbar">
    <button class="nav-btn" id="prevMonth">◀</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextMonth">▶</button>
    <button class="btn-today" id="btnToday">今日</button>
    <button class="btn-today" id="btnMore">⋯</button>
    <button class="btn-add" id="btnAdd">＋ 登録</button>
  </div>
  <input type="file" id="importFileInput" accept="application/json" style="display:none;">
  <div class="view-tabs">
    <button class="view-tab sel" id="tabMonth" data-mode="month">月</button>
    <button class="view-tab" id="tabWeek" data-mode="week">週</button>
    <button class="view-tab" id="tabDay" data-mode="day">日</button>
    <button class="view-tab" id="tabTodo" data-mode="todo">未完了</button>
  </div>
  <div class="weekday-row" id="weekdayRow">
    <div class="wd-sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="wd-sat">土</div><div class="wd-memo-head">メモ</div>
  </div>
  <div class="grid-wrap">
    <div class="month-grid" id="monthGrid"></div>
    <div id="weekView" style="display:none;"></div>
    <div id="dayView" style="display:none;"></div>
    <div id="todoView" style="display:none; padding:12px;"></div>
  </div>
</div>
<button class="fab" id="fabAdd">＋</button>
<div id="saveError" class="save-error" style="display:none;">
  <span class="msg">保存に失敗しました（通信エラー）。</span><button id="retrySaveBtn">再試行</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="storage.js"></script>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){ window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js')); }
</script>
</body>
</html>
